front:
  text: 離峯老人集卷下瑟八
  hash: sha256:d80545a850def508b22a27f29a9e32fbdf412e7bc06754cabf31d97a2201500c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0073_HFL_002-001a, image: hfl/1001/1001-148.png}
body:
  text: 七言絕句偶得寂寥雲水幾星霜收得神仙不死方二物都來十六兩跨將赤鳳入仙郷鍊心道人方寸已寒灰無限塵紛境自廻緫把乾坤爲妙用此身到處即蓬萊贈移剌大師壺中仙景本非常萬象森羅自發光清靜鍊成無漏體冲和養就法中王談人説我何時盡競利貪名有底愁若悟此身還有限蠅頭蝸角一時休王道人吿口訣叮嚀舉似賢飢時喫飯倦時眠靈臺瑩靜塵難染寳鑑無痕性自圓寄德順州移剌笞節副功名未了心先了塵俗俱忘性不忘更著慧風吹萬籟真空獨現一輪光贈門使烟霞堆裏有知音名利場中少用心但得一枝棲宿處何勞苦苦覓深林贈太一宫姜大師靈杖剔開名利鎖慧刀割斷是非繮天然世外騎鯨客自是神遊不夜郷寄郎大師雲溪高枕卧烟霞栽接長生不謝花可與群仙爲領袖已調和氣徧天涯又山南瑞氣騰騰長水北金花蕊蕊開時有靈音傳好信玉虛殿上選仙材又淡淡烟霞淺淺山此身長在翠微間白雲空谷無人到贏得身心竟曰閑睢州吴道人請住庵隱跡雲溪數載間隨風偶爾到人間黄塵著脚非吾事却領白雲歸故山示鄢陵縣劉會首看錢虜與抱官囚擾擾塵中甚曰休有數光陰銷易盡無涯歲月去難留洺州寨尼院主告頌頭頭盡是西來意物物全明祖佛心心意兩忘成妙用不須净裏苦沈吟合流鎮术夾録判索一衣一食莫剛求但得隨緣過便休贏得省心兼省力更無閑事上眉頭示西華縣李庵主山頭滚滚湧靈泉海底炎炎結瑞蓮既濟陰陽丹自結水晶宫裏會諸仙西華縣胡會首告若悟輪廻早早廻金蓮休向火中栽縱然栽得根苗活到底全無一朵開西華縣張庵主告不戀空華與世華道人活計淡生涯興來兩卷閑文字困卧松軒看晚霞西華縣賈道人告斷鶴續鳧忘分與夷山盈壑昧生縁一瓢自足幽人樂寸地常虚大覺仙示陳州吕姑道人心地冷如冰不假營求道自生萬籟無聲心泰定一輪秋月皎然明陳州完顔舍人告抽添間隔炎炎火既濟陰陽旋旋燒鍊就純陽神自出無生路上恣逍遥陳州完顔姑姑告盡曰窮年無處尋得來元不費光陰靈明一點真消息爲佛爲仙是此心陳州孫姑告掃蕩群情事事無莫教塵土翳氷壺胷中一物神光現萬道紅霞罩寳珠贈息州蒲察從宜相公功成名遂早歸山策杖逍遥到處閑明月光中融妙用白雲深處鍊神丹陳州完顔大哥告剪除荆棘開心地掃蕩荒蕪種瑞蓮颯颯清風生玉葉輝輝新月照壺天贈陳州坐圜張道人六慾遣回身自在一塵不染性逍遥栽成火裏無根樹放出靈葩永不凋徐姑告功名恰似石中火富貴渾如水上漚撒手便登雲外路是非人我一時休寄劉三仙睢陽相别久徘徊望斷春雲不到來惜取龍泉無價劒寳光休使染塵埃贈湖頭宋庵主此身天地一孤蓬信意蹉跎西復東不及草庵閑打坐歸來高卧養吾慵長平郭官人告火風地水没來由聚則成形散即休半紙功名虚費力百年撈摝水中漚合流鎮王妙堅告一片閑心志莫移疑團打破證無爲胷中記取全真性亘古常存幾箇知臨頴縣王會首告老却春光人倦遊花殘蝴蝶更添愁不知桂影無凋謝香滿人間甚曰休臨潁縣邵會首告不會擒猨鎖馬顛飢來喫飯倦時眠冥然一枕華胥夢始覺壺中别有天寄和典史幾載持竿釣巨鰲鯨鯢白眼戲波濤絲綸收拾西歸去空渡滄溟又一遭贈舞陽縣烏古論縣丞神仙活計苦無多滌慮忘情氣自和欣則𢹂笻尋野徑困來高枕卧烟蘿示完顔姑姑松䆫石枕惟便睡竹徑人來尚未知驚覺披衣時歛坐形如槁木眼如眉孟寨張會首告頓抛世網復全真洗滌靈宫養谷神常要清虚無箇事桂花開徹月邊新贈禹知觀隱隱遥山鎖翠烟亭亭碧嶂近林泉鑿開混沌些兒景偷得壺中一㸃天南陽縣爼道人告三界有墻猶恨窄四維無處不爲圜黄華翠竹皆吾事雲即雲兮山即山贈程庵主手執絲綸四十秋但逢波浪便抛鈎鯨鯢不肯吞香餌空駕虚舟獨自遊贈术虎夫人人生只解念彌陀自己彌陀會得麽認得本來無相祖不須身外苦奔波贈亢官人莫比山高與海深學人空費遠搜尋目前自有長生道凡聖皆由一寸心贈洛陽薛會首近水臨山鎖翠微利名著脚却忘歸此身不屬紅塵客卧看白雲天外飛移剌答道人告道人行止莫蹉跎心鏡須憑一志磨痕垢盡時光自現不離方寸見彌陀貴姑吿踏徧天涯覔也無得來元不用功夫百年抛却紅塵事有箇真人駕得車姬磨樊會首吿有相縁中無礙身古今誰解識踈親百年抛下孃生袋一箇真人駕曰輪陳州唐括提控吿世網掣開身自在凡籠跳出性尤閑携笻直入烟霞路驚起白雲滿故山馬會首吿既爲學道好參同祕訣傳來便有功一㸃靈明清似水鍊成丹藥鼎中紅陳會首吿身居苦海休言道頭戴恩山莫論禪若是兩家俱放下不須掘地去尋天史都監吿郭外之田數畒園絲麻檀粥保殘年不圖跨鶴乘雲去且向人間應幻縁曹會首吿大道無言在寸心不須千里遠追尋胷中自有圓明鏡莫使塵埃昧得深寄馬文卿悟來休得廢光陰一寸光陰一寸金愛海波中留不住亂雲深處覓知音宿州紇石烈問前程于氏高門元有漸燕山丹桂豈無因不須若問前程事真正無私是吉人贈蕭縣宋大師先生策杖便從容把握靈珠在掌中好向雲山栖隱去閑䆫高卧飲松風懶窩自詠懶漢今來住懶窩禁持意馬已蹉跎飯餘只解堆灰坐更有慵人似我麽贈高姑誰識當場傀儡身一重皮肉一堆塵百年線斷無消息去了當場把戲人示獨吉監丞夫人四象合成癡肉塊五行結就臭骷髏狀同傀儡親曾看箇箇能言解㸃頭贈劉姑水晶宫裏結紅蓮證果無爲大覺仙冉冉便登雲外路騰騰飛入紫微天贈奥屯經歷夫人七十光陰已半過勸人進道莫蹉跎無常一旦臨頭逼兒女雖親替得麽欒道人吿若論修行萬事休胷中不挂一絲頭寂然萬籟無聲跡有箇靈童駕火牛小楊姑吿道人無礙鐵心腸躍出三山混渺茫遥指白雲深處去蓬萊元是舊家鄉贈大楊姑五行結就臭皮囊一顆神珠裏面藏靜即心花通體瑩動時無處不輝光徐道沖吿道人真實最相宜食飽無餘步翠微困即和衣溪上卧覺來收拾亂雲歸仝姑吿人能清靜絶熬煎恬淡虛無養浩然腦後剔開三昧眼心中明徹自家天門人問如何是了達你來問我求了了世事紛紛都盡勦一輪明月正當天萬里無雲光皎皎示高仙從來劣性要隄防舉動靈苗已損傷且把芒繩牢繫守待他心境兩俱忘劉姑告長生路上逍遥客不夜郷中自在仙逗引靈童歸紫府調和玉女種金蓮贈孫天和慧刀割斷利名繮物外逍遥萬慮忘撒手便登三島路程程都是白雲郷又無名窟裏毒蛇藏舉起頭來物便傷寄語行人須著意往來常切要隄防贈尚道人半紙虚名空似響百年短景疾如梭鬢邊白髮新添甚臉上紅顔暗换多贈高都監清風古道少人行濁水淤泥抵死争可笑一般愚蠢物枕糟藉麴過平生徐道沖問道你有真師更問誰同茶同飯幾曾離我今指破知端的舉念生心緫是伊贈小張仙從來伎倆都除盡亘古靈明倒過來拾得這般真受用世間無處不蓬萊展姑告了得真源萬事無塵縁不許污靈珠水源澄浄全身現雲散寥天月自孤博志堅告修行非易亦非難下手先除人我山鍛鍊真空同一體自然心似白雲閑李姑告漠漠春烟曰漸長江梅猶帶返魂香洞天先得真消息催逼東君造化忙初春臘盡春回白晝長洞天先得好風光東皇來約群仙會歸去碧雲衣袂香臨頴李縣尉告風裏微聞松桂香山堂明月冷輝光道人夜靜翛然坐萬籟無聲一味涼李姑問行程渺邈蓬壺咫尺間行人迷隔萬重關牧童不指襄城路黄帝猶尋大塊山贈周姑勢利看來冷似氷道人於世已忘情昨宵一枕遊仙夢穩駕金鸞朝玉京贈移剌答院心灰冷落無烟火枯木形骸不放芽直待三陽真火降堂前鐵樹也開花尼長老問修行你來問我修行訣我今與你叮嚀説掃盡群陰現本真青霄挂起一輪月又去住逍遥信自然龜長蛇短祖師禪山頭一片清涼境始見壺中别有天董志源告慧刀舉處散群迷迸出銀霞萬道飛滅却陰尸多目鬼蓮花帳裏露希夷贈會首薛六郞先天靈物有無中動即隨機靜即空萬物之中常作主千般運用應無窮春遊年老心嫌衣帶長强𢹂笻杖看春光滿園桃李皆相羡都道肌膚似沈郞厨張問生死事昔時死者何曾死今曰生來有甚生生死到頭元有甚安時處順要分明遊雲溪衆仙邀我探春來縷縷春紅相間開悞入桃源即非夢人間何處覔蓬萊張悟真告壼中一粒紫金砂鍊就光生萬道霞服了不知浮世隘頓然身在大方家周姑告般般識破都爲夢事事諳來緫是空悟得不空安分過從他烏兔走西東張懷遠告物物般般緫不迷廻頭參破老禪機莫教流落人間世無相天真要執持劉令史告真清真靜逍遥客無執無持自在仙策杖便歸雲外去草鞋踏破洞中天贈孫大師惜神養氣固靈田境靜心閑道自然赫赫光中生瑞草炎炎火内結紅蓮石碢玉溪庵閑遊三首道人策杖看西山心似白雲到處閑一枕困來仙闕夢豈知身在翠微間忽憶逍遥物外游便𢹂藜杖步林丘騰身直上三峰頂虚徹靈源萬慮休昨憶仙遊到此山箇中景物共閑閑白雲出岫亦無意幽鳥與人皆偶還辛先生告道人心定寂寥居皎潔圓明似玉壼雲去雲來俱不礙無生無滅證無餘劉先生告大道虚無本自然不勞苦苦用多言但教心上無塵垢一㸃靈明光自圓毫州太清宫陞堂我是雲溪懶丈夫祖庭羽客强相扶無疆聖壽祝延外看有金鱗上釣無太清宫棲真庵述懷清風招我到棲真境界翛然斷世塵猶有歲寒君子竹窗間橫影弄精神竹裏啾啾百鳥喧竹齋呼起曰高眠將迎不斷人如織我自胷中獨悄然踈懶從來百不拘披襟閑看老莊書忽然讀到忘言處枯木形骸等太虚西郊火老暫開顔頓覺幽庭枕簟寒萬里碧天清似水那堪梳月半𠾑山讀忘意論檢徧南華覔也無得來元不費功夫須知自有天真在一㸃靈明常湛如記夢夢中親覩聖賢來白鶴青鸞下玉臺一簣大還功未就瑞雲繚繞復重廻又寒䆫寂寂枕書眠覺後檠燈尚儼然簷外月華明似晝風停烟靜太平年示時官一行作吏莫傷民百計施恩與曰新入則敬親出則悌外全仁義内全真張姑吿世務多般不可窮人間事事轉頭空廻頭記取先天物劫壞長存無始終世上功名不可求人間富貴轉頭休争如早作歸山計一片白雲天外遊勒姑告水南水北路交相人去人來有底忙争似一庵閑打坐寸心無事自清凉霍道人告假軀六十過半百蒼顔已老髯鬚白擾擾紅塵已倦遊雲山且作烟霞客康國寳殿試至迢迢溪上水雲平岌岌山間道路生但得秋風片帆至扣門一見眼增明石碢贈石道人欲求罔象得玄珠既得玄珠事事無切莫法中尋有相須知無上證如如杜鵑青山靄靄亂雲低切切幽禽晝夜啼啼得血流誰解意聲聲猶道不如歸示杜道人緑葉陰陰障夕陽白雲片片渡秋塘道人不解紅塵事隱跡林泉寵辱忘贈曹道人我愛林泉景最幽白雲深處水東流道人不管興亡事一片身心得自由懷州高姑告道人活計不憂貧冷淡家風不染塵雲散月華明似晝廻光得見箇中人石碢董七郎吿古道家風不可求翻騰故紙幾時休争如撇下歸家去月白青霄水自流寄田户店曹孔月其人以水牛自稱寄語曹家老水牛芒繩穿鼻拽廻頭時時更與加鞭箠白到全身得自由仝道人告人間莫得辯癡愚辯得愚癡却是迷要識清虚端的理白雲深處悟希夷嵩州李姑吿萬路千差獨往廻靈山採得寳珠來春風莫露閑消息箇裏雲苞尚未開萬水千山路不差蟾宫先得桂枝花殷勤爲獻丹陽父許占蓬萊第一家嵩州張姑吿悟取無言理最深不須遠走訪知音忽然放下頭頭是一片清虚冷淡心贈嵩州獨吉太守碧山深處白雲閑却憶雲閑偶到山鳥道暗通烟樹外木人還過翠微間王道人告勤磨慧劒斷愚癡吐出靈光泯見知從此身心無罣礙元君到處自相隨郎十二先生吿萬水千山路不差山廻路轉景尤嘉故人相見無他語坐對羣峰看彩霞贈石碢馬道人山村寂寂近林泉春盡無人柳帶烟别後欲知何處去蓬萊閑看玉壺天贈張仙道人著力向前修海角天涯作盡頭踏破鐵鞋方省悟千山萬水一齊休鄆城縣賀先生告道人真實是功夫不用丹經與子書悟得一言行不盡端然靜坐觜盧都為唐庵主姑姑壽劫外靈芝不假春壼中境界更無塵天邊爍爍榆長白月裏團團桂自新王道人告跳出紅塵身自在箇中生死轉分明縱橫無礙逍遥性何必飛騰十萬程小李姑告洗滌塵情事事無靈臺瑩徹似冰壺不須更問祖師意拍塞虚空一顆珠示邊大郎七十年來老滑頭談禪論道幾時休直饒萬法俱明徹不到灰心冷似秋常姑告尋師訪道苦參求籠絡身心不自由無限玄談都拂却一輪明月出山頭贈韓會首躍出紅塵萬事休已將身世付虚舟碧波深處抛香餌未信金鰲不上鈎贈术虎都統策杖飄蓬恣意閑雲朋來謁水雲間相逢一席無生話不覺紅輪西下山趙道人吿一夕秋風萬葉凋道人活計轉寥寥煩襟洗盡塵勞事咫尺蓬壺路不遥示許姑修仙先要除人我學道須防較是非七寳山頭烟火滅五明宫裏證牟尼贈張副使身是飄飄一葉舟不辭風浪故來遊烟波深處抛香餌不得神鰲不肯休又布袍策杖飄飄去一片孤雲天地間到處不能爲雨露却歸林下伴青山贈張小一郎秋風掃蕩乾坤靜萬里無雲㸃太清唯有一輪無相月先天先地轉分明示𤁄陽馬姑東西行脚天涯客南北求玄自在仙參得祖師劫外眼歸來却見自家天示王姑十載諸方負杖藜豈知行住自相隨却於販骨聦明鬼唤起先天先地師示周道人磊磊男兒七尺軀刀頭䑛蜜卒非夫須知自有天然寳枉向驪龍覔頷珠寄沔池納蘭縣令爲官公正勝爲道此語宜書仕子紳莫謁麻衣方外客且將良藥濟殘民贈宋大師不看丹經與子書快來心上一塵無此身便約雲爲友去住與之同卷舒元道人吿大道虚無本自然從渠委曲且隨緣窮通貴賤俱由命巧拙賢愚只在天贈中京張孔目久戀紅塵來往頻林泉豈識有高人貪看曰上花梢露失了壺中不夜春王會首告鑿開混沌見天真跳出紅塵自在人聊向鏡中觀物化莫教化却自家身贈張副使我本持竿釣巨鰲從渠風惡起波濤但教神物吞香餌萬里扶揺不憚勞贈司天臺判高人策杖扣荆扉來訪簞瓢一布衣目擊道存忘意論虛心而往實而歸柴姑吿身中寂寂閑機少境上融融和氣多兩袖清風常左右一條紅練出烟蘿寄張道人已向絲綸脱此身百端香餌不相親長江好在無邊浪莫使風塵到錦鱗贈趙會首春光屈指又經秋販骨何時是盡頭恩愛結成他活計此身作下馬和牛贈偃師縣趙散人悟時咫尺是蓬萊迷後重重不盡埃一㸃孤燈纔剔正莫教油盡暗還來贈老史道人壺中金碧好樓臺月裏瓊花爛熳開鶴唳青霄丹鳳舞彩雲深處有蓬萊贈趙道人靈臺一㸃本無塵幻出空身即法身道在性中休别覔隨機應物即天真示龍窩張會首吾家門户幾人知知者須明造化機清靜之中含妙用無爲之内隱玄微仝姑吿割烹誰忍能鳴及斤斧終難擁腫施才與不才俱是用此生木鴈復何爲田道人告學道先須達自然自然然後得真仙濃粧淡抹空顛倒想爾鑚氷不得燃示南京三相公廟㓂姑真清真靜永綿綿鍊氣先須識自然一粒丹砂功九轉瑞霞萬道罩金仙示元仙初心入道戒蹉跎正好叢林細琢磨莫遣新塵侵寳鑑更防舊境損天和示梁道人皎潔玄珠映太陽水晶宫裏發輝光身中有此無窮寳却爲浮生抵事忙過孟津滔滔烟浪向東流浴曰浮雲是幾秋若得靈槎遊大海扶桑國裏看瀛洲示木匠楊仙走徧千山與萬山此身猶似白雲閑歸來卧看青霄月聒耳松風徹骨寒董知觀告大悟纔知無做作玄言祕語齊拂却撒手東西信自然策杖逍遥遊廣漠贈嵩山田道人得到逍遥謁故人依然雲隱養天真西風吹落松梢月坐待扶桑輥曰輪告縣楚會首全真門裏選仙材踏破雲山特地來吾道易行不虚語世緣倒過即蓬萊詠雪朔風凛冽亦雄哉吹落天花徧地開桃李未知天意動臘梅先覺化工來偃師縣税務李都監告解出無涯欲浪來聦明端勝選仙材先天靈寳人難覔寄向南宫無影臺示史道人衆妙之門曰曰新家風冷淡絶纖塵閑招雲外長生客同賞壺中不謝春自樂風過庭松唤午眠覺來石鼎尚沈烟不求羽化乘雲鶴且作人間陸地仙辭太清宫去去西風吹道衣祖庭未得遂真依他山猿鶴閑緣了管領白雲容再歸寄尚仙冥中鬼趣時時遣物外玄門曰曰開墨子悲絲元自染楊朱泣路未歸來李官人告萬里烟波一葉舟輕帆短棹泛中流蟾光影裏閑垂釣那計鯨魚不上鈎寄陳州道友功成名遂好抽身作箇林泉自在人採得曰䰟爲大藥鍊成月𩲸現陽神寄费莊李官人學仙未到棄塵緣海嶽涓埃積漸然更向玄門輕進步蓬萊别有洞中天寄白沙道友猿馬輕狂牢鎖閉休貪世樂心如醉悟來跳出死生關一靈真性無凝滯贈李道友仙人五畝小蓬瀛四百秋波分外清視聽不須關耳目希夷路上坦如平示吴善友人人只解念彌陀自己彌陀會得麽記取本來無相祖不干般若與波羅李會首吿衆妙之門曰曰開家風峻古絶纖埃雖然淡薄無餘事不許等閑人入來示任姑打破疑團笑一場不須來往徧諸方胷中有物明如月却覔他人夜燭光示史道人物外玄微世上名一邊敗後一邊成後來蓬島洲中客不在邯鄲路上行示陳會首一灣流水遶雲溪晝夜泠泠説道機多少往來名利客貪觀風浪隔玄微示王道人直鈎不鈎波中月數罟難撈水底雲用盡身心離道遠諸緣放下許傳君寄隴西老人遥望東南木葉飛滿空秋氣逼人衣仙翁已達丹霄景閑對青松吸翠微小李姑告出家須是學神仙好與長生作善縁但肯此中留一念瑶池會裏結金蓮示劉令史紛華塵外三山客苦海波中一葉舟試擲絲綸深浪裏游魚若箇肯吞鈎示姬磨李道人息慮忘機任自然不須訪道與參禪因循一片閑雲起礙却壺中不夜天示峽石縣冀會首夢中又説夢中事覺後纔知夢已休拂石南溪觀物化滔滔依舊水東流寄陜州會首神丹常在掌中握玄鑑只宜心上安照破世間虛幻境自然身似野雲閑示玉溪庵王道人人生何處不逍遥論甚山村與巿朝但得寸心諸畏盡虎狼群裏也囂囂示費莊夏會首我家門户本幽玄寂寂寥寥任自然脩短纖洪都莫話飢來喫飯倦時眠太清宫退堂我本桃花峰上客忽遺塵跡在人間祖庭雖好因縁早且放白雲歸故山又風馺飄飄來祖庭瑞烟芳草桂花馨因縁未合須廻首却入伊川卧錦幈還長生觀識破從來古面皮千非萬謗任從伊輕烟薄霧空遮障依舊遥山不皺眉自詠截斷當頭竅不鳴玄珠收入寳花瓶從今更不矜愚智閑了將軍便太平遊老君山飄飄風袖出山門廻首青山似老君試聽清泉山伴語分明説盡五千文示雉岔山胡道人亂山深處結茅齋萬頃雲烟撥不開採藥仙童風袖裏異香隨得紫芝來示張會首爲仙爲佛要功夫塵念塵心子細除待得靈明光宇宙始知糟粕世間書蒲察提控夫人告我愛林泉景異常天風吹散桂花香行人欲去還廻首笑殺浮生有底忙蒲察夫人壽道人亦欲祝渠壽世事冥然不知一粒仙丹煩領略松齡鶴筭未爲奇贈孫太師夫人功名未了身先老白髮蒼顔下手遲頓悟此身非我有真空不動片雲飛田會首吿炳焕靈明是此心片言遮障作重陰清虚自有真消息莫向諸方法上尋馬姑吿造化無窮盡自然不須身外更求仙天光發處凡情滅寳鑑明時道眼圓離峰老人集卷下
