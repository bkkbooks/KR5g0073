front:
  text: 離峯老人集卷上瑟七
  hash: sha256:01ea73ec2566cd7ed67ed29084f3338d850e71409c0f48fed75cefeb3fa2b606
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0073_HFL_001-001a, image: hfl/1001/1001-094.png}
body:
  text: 七言律詩述懷翠巖西畔道人家門外間田遍野花蝴蝶紛紛猶是夢遊蜂匆匆未忘衙雲間童子攜靈藥空裏仙人步彩霞間想紅塵名利客不知壺內有天涯又漠漠青煙鎖翠微瀟瀟落葉四簷飛紅塵事少夢魂好碧漢雲橫星斗稀水冷霜清魚不食山窮木瘦樹無衣道人度曰踈慵裏門外紛紛總是非又紅塵汩汩幾時休去作逍遙物外遊好水好山行不盡奇花奇果景何幽風來藥圃清香細月到芝田紫艷浮間向林泉佳處隱世間何事上眉頭又南山一望勝天平天宇浮嵐入眼清自古神仙多隱迹至今羽士學長生人間興廢成今古雲氣翻騰變晦明只有老松並怪石青青不改四時榮又達人生死莫能拘解著神機應萬殊顯即恰如雲綻月晦時還似蚌含珠冥冥內照靈明主赫赫融開造化爐鍊就金丹無晝夜萬條紅焰晃氷壺又暑往寒來氣自然西風又是桂花天山空木落鳥依樹霜降水寒魚在淵物外雲朋忽相訪洞中幽客正高眠杖藜輕觸琅玕響唤起華胥夢裏仙又不學參玄與問禪一庵瀟灑寄林泉空中天籟宫商意物外家風道德篇一枕間眠芳草畔數聲樵唱夕陽邊此身未得驂鸞去且作逍遙陸地仙又傍人笑我太風魔這箇風魔會得麼已與沙鷗盟蓼岸更隨山鹿上煙蘿三竿曰底齁齁睡一曲人間踏踏歌歸去吾鄉安穩處看他平地起干戈偶書翩翩風袖碧雲端曾伴洪崖到洞天去馭華芝鸞下界來栖琪樹鶴千年紫霞吐焰籠丹鼎明月生光罩瑞蓮蒼佩一時低拂地金童傳下玉皇宣煙霞亭危亭縹眇出雲霄十二欄干眺望饒回首塵寰如撮土有時天籟自吹簫遠山木末重重翠細柳風中萬萬條咫尺煙霞人不到蓬壺仙路信非遙示人為佛為仙在寸心可能塵世廢光陰蹉跎望道期程遠迤邐勞生歲月深已醉利名濃似酒不將神氣惜如金琴心三疊胎仙舞欲作玄門座右針因迷人索路作六窗通達見天光徹去藩籬是大方至道有歸皆坦直迷人著處自倣徨程程盡是長安路在在無非廣漠鄉博塞挾書都撥置更於何處覔亡羊答人有人向我問玄珠一點靈光照玉壺亘古亘今長不滅先天先地幾曾無六塵堆裏存真宰七寶山頭弄假軀此箇家風人會得不勞足力駕雲輿又悟時拂散利名塵作箇逍遙自在人間向溪頭盟水鳥偶來林下睡莎茵紛紛俗事終無限擾擾愚人不識真只見目前生與滅那知壺內有長春寄郎大師俗隱已别經今十有年歲華易得道依然韜光晦迹潛真士接物隨機應世賢鄭圃生涯畦隴外漆園意氣水雲邊百年拔宅超雲漢人世清名萬古傳示張都監莫戀浮華悟此身好將恬淡養天真眼前便是夢中夢覺後方知身外身壺內好栽無影樹洞中先得未萌春紛紛俗輩應難辨赫赫天光曰轉新幽居門外清流屋上山偶來此地寄安間書因遮眼有時讀名惡為賓無意攀修竹種成千萬箇茅廬結就兩三間幽情猶有雲相友暮卷朝舒數往還示小張仙兒童笑指布袍寬上界仙衣總一般鶴唳青霄雲冉冉鸞鳴鳳闕月團團金童紫府分瓊屑玉女丹臺輥魄丸昨曰玉皇忙詔下已書名字上仙班示玉溪庵主道人腳底片雲生欲作逍遙物外行盡把黃塵衣上拂却將明月杖頭橫數峰平地畫圖起一見使人毛骨清便欲終焉謀此地儘他世上利和名示石蝸楊庵主落魄誰知却丈夫人間富貴視如無居鄰雲水安常靜委分簞瓢不強圖但得物來心似鏡從他人笑貌如愚虛空蕩蕩無遮障萬里青霄一顆珠寄張官欲出家丈夫臨決莫徘徊好念栖真早早來大道悟時須寂滅浮生識破盡塵埃亦憑假合修丹藥暫借精神結聖胎脫了陰陽無造化先天一物照靈臺寄李庵主心地逍遙氣自和從他人世自風波玉輪欲見清光滿寶劒猶須利石磨斫却孽蟊間障礙會看丹桂復婆娑爛然一色成金界塞滿乾坤不厭多寄嵩州劉二官蓋世功名身外事掀天富貴世間榮覺來只是須臾夢悟後元無寵辱驚寶月天心人共見驪珠海底獨增明人間上士懷仁惠正好將心進一程示韓會首力命窮通各有因不須呻訴笑聲頻恢恢天網踈無漏密密樞機暗有神曰月虧盈皆運數陰陽生殺豈踈親我觀造化南柯夢誰作蘧然睡覺人示劉姑跳出紅塵須做徹心清意靜添決烈寶劒騰輝萬焰寒瓊花開滿群芳滅紫府真人下玉京雲車月席旌幢列手掌還丹晃太虛比時不用黃金屑示术虎萬户功成名遂早歸山落得身安心更間返視紅塵真墨夢竟無靈藥駐朱顔居連蓬島何由俗門寄煙蘿不用關忽有一丸金彈出飛勝來往照人間示夾谷都統得失窮通任自然不須欣喜與憂煎今生富貴前生種見在修持過去緣廣武坡頭些子快杜郵亭下幾多愆一還一報何年盡學我同修物外仙寄張副使莫戀浮華欲境侵蓬壺仙景轉難尋丹臺神爐浮埃翳月殿靈芝野草深試問窮他無盡事何如悟取本來心殷勤下手三千曰鍊就壺中一井金示道人學道先須泯見知衆中緘口最相冝休憑六六為玄妙莫論三三做執持澄徹靈源觀隱奧剔開慧眼認希夷深根固蒂長生術以至無為無不為示張庵主昔曰曾聞上古仙巢居穴處到今傳民如野鹿那知謝上若標枝亦自然善惡兩忘遊廣漠死生一貫泯諸緣折衡剖斗知何曰再變鴻蒙作此天示翟監丞浩然野客今逢翟浩然幾時相伴住林泉功成名遂身須退迹晦光韜地自偏混沌爐中燒大藥鴻濛鼎內煮金鉛丹成服了朝元去得處華陽不夜天示衆會首光陰有限風中燭身世無憑水上漚當念朱顔須改色休教白髮早臨頭貪中愛欲消磨盡妙裏希夷子細搜身入大方圓覺海太平國裏信遨遊贈溫迪罕明道往曰聞名今曰逢坐間忽爾起春風氣和面上桃花色神定爐中丹藥紅嬰姹綢繆歸紫府虎龍交入離宫逍遙海上求玄訣路入蓬萊一線通寄紇石烈先生兀兀騰騰自在身相將談笑出紅塵修程穩入三山路和氣融開十月春洛下香分梅萼破水南青入柳梢新肯來此處同修鍊不作勞生夢裏人示翟浩然大覺才知大夢休便乘物化恣遨遊神如霄漢離籠鶴身似江湖不繫舟玄理却於枯木得繁華都付落花流而今不復行藏問蠖屈鯨掀信自由繼人韻雲海相逢得道人料應秋水作精神來乘白鹿遊三島去跨青鸞謁五真鼎內鍊成千歲藥性中消盡六根塵先生已獲神仙術德不孤兮必有鄰贈王大夫鶴髮霜髯世異人肯來此處話長春好栽月裏枯根樹便鍊壺中無價真但得修完天地缺何須陶鑄秕粳身蓬萊要到君須到可與羣仙作近鄰示司天臺判擾擾塵中悟一真飄蓬便作自由身青雲放鶴心無繫赤水藏珠道不貧壺內樓臺三島景洞中花木四時春青鸞白鶴翺翔處金碧寥陽一樣新寄顔小仙後生可畏我憐渠血氣方剛汝畏無暫向紛華留視聽便於熏鍊費工夫心如鐵石愆初志景逼桑榆失後圖但著此心相警戒暗中自有聖賢扶示李道人清虛可鍊道心堅寂寞能熏智慧圓金玉滿堂終棄物丹砂一粒却延年人間貪作紛華夢物外那知道化緣此理若能回首得會看箇裏起飛仙勸世浮名浮利總悠悠繫綰人心早晚休一向經營忘了曰幾曾富貴到枯髏寶山有分空回首苦海無涯強出頭性命懸絲如傀儡不知人戲作風流過連昌連昌宫闕已平沙不見乘鸞只見鴉依舊嵩峰橫木末無窮洛水去天涯霓裳曲罷山禽語端正樓空野草花千古繁華留不得幽棲今屬道人家示史道人區區名利古今情得亦驚來失亦驚蝴蝶夢中無至覺白駒隙內競浮榮銅山寵詔千年調金谷危樓一旦平爭似道人休歇去水邊林下過平生又遊仙枕上夢仞醒竹屋風來拂面清已聽漏聲煙外轉更看斗尾樹梢橫塵凡消盡渾無迹龍虎交時自有聲放出紫毫金一粒飛騰上下鬼神驚寄郭庵主浮生忽忽葉辭柯百歲光陰已半過塵外青山空悵望鬢邊白髮轉添多歲云暮矣能無感君不歸兮可奈何我與沙鷗盟已了此回休更負煙波示渠知觀一氣寥寥出杳茫已先剖判統陰陽區分造化羣靈祖囊括虛無萬彙昌動處玄機酬物變靜來虛室發天光學人切莫尋蹤迹認取真空是法王示亢官人為官何似學神仙真靜真清養浩然曰曰玉爐燒大藥時時金鼎鍊紅鉛蒸生瑞氣騰清漢種就金蓮罩紫煙功滿朝真廣寒去相隨同赴大羅天寄張提控幾年與我約林泉却為虛名一旦牽沙塞雖遙猶有志瑶池非遠尚無緣栖遲雲壑道家事指顧英雄將士權直待功成名遂曰退身復證大羅仙示嵩州蒲察知觀玄元至道本無言恬淡清虛盡自然壺內一天新世界洞中三島别山川丁公未娶離宫汞玉姹深藏坎户鉛混沌等間休鑿破免教鍊石補青天示郭知觀一瓢檀粥是生涯與道相為友者耶靜似澄江浮曰月動隨冥鶴去煙霞青生霜鬢星星髮黃吐丹田寸寸芽更待七還功了後九陽宫裏看金華示趙先生澗水金山可隱居我來此地作蘧廬道鄉著腳程程穩世事回頭曰曰踈架上塵書三兩卷門前煙柏幾千株邇來泰定天光發一段靈明結寶珠示樂經歷寵辱於身事若何一端著處損沖和光陰回首漸將少金玉滿堂誰厭多不向壺中尋曰月空嬴心上起干戈爭如早悟無生計劫外靈光壞得麼又四大身為造化爐五行真火鍊虛無炎炎海底生紅焰昧昧塵中顯太虛有相形軀終假合無生法性是真如靈童鑿透昆山玉價直連城買得無寄張提控白髮匆匆已滿頭紅顔忽忽暗中偷神仙有分須輕舉世事無涯莫苦求幻影不禁風裏燭浮生非久水中漚功名總是何樓物謾過聰明人不休示人誰識人間自在仙飢來喫飯困來眠一庵避地堪容膝半紙虛名不值錢明月當空正端正清風為我每周旋堂前不種間花草自有琅玕翠接天贈嵩州王押司子細分明舉似賢道之一字屬塵緣至虛至寂那容叩精妙精微不許傳靜裏光明天有眼玄中造化火生蓮大千歷遍俱無礙一顆神珠處處圓示寧海郝縣令説與人間大丈夫人人都有夜明珠昔年愛欲塵深昧今曰磨礱垢自無一段光明如寶鑑十分皎潔若冰壺崑崙頂上靈泉降澆灌瓊花永不枯太和贈孫提控莫戀浮華悮此身好於靜處養天真人生到了成何濟世事從來欺得人積德何愁仙路遠忘情自是道緣親華胥夢斷陽神出化國同遊不夜春遊角子山流行坎止信間緣角子山遊亦偶然已作浮萍常泛泛不妨風袖又翩翩數峰平地如圖畫百鳥幽林自管絃咫尺七還功了畢人間勝處盡飛仙示元道人虛名終曰謾區區借問流光駐得無只見浮雲蠅競血不知幻夢月驚烏多生貪愛塵緣重迤漸摧殘玉性枯説與聰明端記取身中惜護夜明珠誡厨齋厨薪爨曰忙忙糊口都緣臭穢囊千食一耕非易致百鞭匙飯已多傷惜如腦髓人間物不自鋤耕道舍糧忘却息心常減戒披毛戴角與他償自詠海上飄蓬四十年年來年去久翛然春風自遠無生地秋月長臨不夜天定起肘邊猶有柳景忘腳底已無蓮殷勤寄語塵中友早晚雲溪結此緣又落魄雲溪一散人小窗高卧養天真夢中既悟終無夢身外方知更有身寒月挂空千歲朗韶華著物片時新爭如認取長生理無古無今一樣春繼孫伯英韻孤身到處便投棲踏碎煙霞路不迷翠鳥天邊誰信息白雲風外自東西玄霜搗出蟾中兔真火驅來曰內雞收向玄中成久視一靈真性與天齊贈孫伯英高人久已厭京華卻憶仙山卧彩霞竹杖芒鞋為伴侣藥爐經卷作主涯飢餐橡實和山芋渴飲松黃與石茶彼是此非都不校只知身屬大方家又應物隨機信自然自然之內隱真仙不須斷簡窮經論已向拈花悟祖禪心定儘他間伎倆神安得此好因緣箇中便是全真趣何處雲山覔洞天又學仙大抵要叢林舉動無令熟境侵名利場中休著腳聖賢分上好留心既從一簣成千仞須把微陰作寸金神氣結成無漏體𤇆霞别有好知音又美目修容得幾秋忽然枯骨卧荒丘生前伎倆千般巧到此英雄一旦休迷後悲歡為實相覺來生死若浮漚箇中靈物何嘗壞留與行人作悟頭贈鄭令史可憐鬢髮已蒼蒼牒訴堆中盡曰忙世利既如湯沃雪筆尖剛甚蠆搖芒甘肥適口全家樂冤債臨頭一己償顧我此言如藥石願君服了也心涼贈張庫副紅塵早晚賦歸休作伴逍遙雲水遊了却一生容膝計媵如三載抱官囚壺中自有延年藥世上終無不死由異曰功成超達去瑶池會裏列仙儔寄王縣令是非場上好抽身作箇無憂自在人藜杖便遊雲外路芒鞋不到世間塵舉頭明月堪為友到處青山總是鄰卜箇小庵安穩地松窗高卧養天真寄嵩山季先生遙望東南翠萬重先生高卧此山中紛華識破塵緣盡微妙蒸開法眼通世上有書都拂却目前無法可牢籠殷勤更與含靈便完取垂成一簣功寄西山董道人出家鍛鍊藉叢林切忌離群快此心試問浮雲憎不義何如流水覔知音曾經巧琢方成玉吹盡殘砂始見金見説蓬瀛多益友更休取次廢光陰梁老姑告學人莫事苦熬煎大道元來本自然真靜真清成運用不雕不琢就方圓五明宫內生芝草七寶山頭長瑞蓮折得一枝歸縹眇瑶池會裏薦諸仙示王庵主仙風只合住林泉識破塵緣覔道緣拂盡紛紛心上境修成默默性中玄天光發泄迷雲散法眼開通慧月懸更把銀河顛倒捲洞中澆溉紫金蓮示梅仙天然道骨慕真修自是紅塵不得留野馬已知窗曰短醯雞肯向甕天遊壺中鍊得長生藥海上從他不繫舟更好暮天歸去後一輪明月碧江秋示嵩州張倉使要作全真門下客便攜笻杖出紅塵磨開寶鑑生光焰鍊就丹砂伏鬼神萬染悉除心上境一言唤覺夢中人回頭返顧區區者盡為聰明喪本真題石碢庵極目煙嵐鎖翠微道人來此便忘機眼前總是真清靜耳畔全無間是非遠岫雲邊橫翡翠細泉門外滴珠璣紅塵咫尺如天遠寂寞松陰晝掩扉贈石碢趙繼先識破浮生水上漚一塵不許到心頭有時黃卷拈來罷無限青山興便遊莫笑一瓢成活計却令千古仰風流有人來問修行法食飽無餘事事休寄張倉使此身有限莫蹉跎百歲光陰撚指過正憶黃金囊裏少不知白髮鬢邊多臨頭生死誰能免滿眼兒孫不奈何爭似聞身強健曰早邀明月赴煙蘿示楊會首休言火裏長金蓮莫説家中有洞天大抵出家離愛欲直須絶慮造幽玄磨磚作鏡終無假拂石成羊亦是權若到神通無礙處便教平地也為仙秋曰示完顔道人朝來白帝作霜威似與乾坤助殺機木杪不禁群葉下天涯更促亂鴻歸紅塵遠客愁絲鬢紫塞征人病鐵衣唯有仙家無箇事一杯檀粥掩柴扉太清宫述懷睡起逍遙間放意瘦笻扶我到棲真風中紅紫時時落雨後琅玕曰曰新勝地自然生瑞氣蒼天不住走紅輪仙翁忘却人間世卧聽晨鐘恰轉身示趙道人收拾精神向內觀莫教窮賊外相瞞六門玄鑰塵根斷七返還丹道氣攢玉露降時珠顆顆金霞飛處月團團水精樓閣真人位赤鳳烏龜上下蟠張姑告一爐春雪下工夫鍛鍊須成顆顆珠萬道銀霞光錯落千般瑞彩色糢糊嬰兒採得靈芝草姹女偷開造化爐有箇真人間作戲杖挑明月弄虛無贈清平李道人老大看書目不禁只宜靜處養虛心百骸和暢神無夢四體沖融息自深鑿破荆山搜璞玉撥開丹鼎覓真金我今説與神仙訣可付諸人惜寸陰王副觀告説與人間烈丈夫時人都有夜明珠昔年埋沒諸塵昧今曰蠲除片意無一假光明如素練十分皎潔若氷壺崑崙化作靈泉液澆灌瓊花永不枯贈師會首釋氏拈花猶示現達磨面壁正遲留本來靈物無圓缺自是人心妄贅瘤大道忘言非有説谷神不死覔無由至人一得慵開口渴飲飢餐萬事休贈張會首淵默雷聲各自如箇中消息本虛無蘧廬生死非由智土木形容不是愚數息區區間伎倆餐霞屑屑淺工夫要知世外神仙訣奪取驪龍頷下珠五言律詩寄洞霄宫完顔提點寄語洞霄客天姿幸有餘善行本無迹處世不如愚念此膏然燭輸他蚌隱珠光明休外現惜此養殘軀寄郎大師寄語西山老山居亦樂哉萬緣俱嚼蠟一念自寒灰去鳥榰頤送新詩信手裁高真多愛惜不放出頭來述懷麻衣與葛巾天地一間人蕩蕩超三界巍巍出六塵洞中仙不老壼內景長春走上崑崙頂回頭看北辰又道念堅彌熟人情自遠踈清虛為活計寂淡養真如鉛汞烹金鼎玄霜鍊玉爐功成歸去後永永住仙都示中京賀會首冷翠嵩峰逼幽棲澗水依人清漸踈薄道念益精微鸞鶴丹庭聚雲霞寶殿飛解蘭亦何者一去不來歸繼雷公韻信步入林泉蹉跎四十年月中不用指魚後已忘笙歲月行如此情懷亦淡然仙山未歸去應物且隨緣五言絶句二十二首世事般般了浮生事事休頓然三界外不挂一絲頭大道極幽玄清虛合自然撥開三昧眼别看一重天有相明無相真空混色空有無俱不染一點太虛中欲作無礙身還却輪回債剔正性中燈照破虛空界茅廬寄城角誰識是仙鄉地僻人行少心清道味長頭頭俱是道物物總為明未敢全相許忘言自太平颯颯秋風起飄飄亂葉飛這些端的事全體露玄機世外養高士塵中異俗人放開清靜眼看破利名塵解脫本吾事死生非我關心如空月朗身似野雲間白雪性中真百紛那得塵撥開無縫鎖跳出自由身色身元有屬實性豈無根試向中間覔依然主宰存伎倆都休盡聰明自到來形難鏡中遁節向刃邊開愛滯凡情重心澄道味真兩全無是理一割正須人大巧元如拙囊錐莫出頭一朝原兔盡良犬汝無憂渤海一遊遨千重雪浪高試將山餌擲若箇是神鰲生者本無生死者亦非死悠悠生死中無人知此理四大作神奇五行為臭腐改换百千般翻騰一萬古世情元有限大道即無邊苦悟浮生夢心如出水蓮既作逍遙客須尋物外人相逢無一語目擊道先親紅塵不到處此地養踈慵説與同心友浮生總是空功名何曰盡富貴幾時休識破浮生夢還如水上漚我欲拋香餌神鰲不上鈎却回孤棹去月冷碧江秋六言絶句二首道本無言無説只要君心猛烈撥開萬里間雲推出一輪明月黑汞鍊成白雪赤鉛結就黃芽燈下手親分付深藏自己靈砂離峰老人集卷上
